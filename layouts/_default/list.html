{{ partial "header.html" . }}
<main class="main-body">
    <div class="article-wrap">
        <h1 class="article-title">{{ .Title }}</h1>
        <div class="article-content">{{ .Content }}</div>
    </div>
</main>
<style>
    .main-body { padding: 60px 20px; background-color: #f4f1ea; min-height: 50vh; }
    .article-wrap { max-width: 800px; margin: 0 auto; text-align: center; }
    .article-title { font-family: 'Tangerine', cursive; font-size: 5.5rem; color: #5d4037; }
    .article-content { font-family: 'Lora', serif; font-size: 1.3rem; line-height: 1.8; color: #333; margin-top: 2rem; }
</style>
