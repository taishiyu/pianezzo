{{ partial "header.html" . }}

<main class="home-main">
    <div class="container">
        <section class="intro-content">
            {{ .Content }}
        </section>
    </div>
</main>

<style>
    body {
        background-color: #f4f1ea; 
    }

    .home-main {
        padding: 160px 20px 120px 20px; 
        position: relative;
        border-top: 1px solid rgba(0, 0, 0, 0.03);
        box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.02);
    }
    
    .container {
        max-width: 900px; 
        margin: 0 auto;
    }

    .intro-content {
        text-align: center;
        color: #333;
    }

    .intro-content h2 {
        font-family: 'Tangerine', cursive;
        font-size: 5.5rem;
        font-weight: 700;
        color: #5d4037; 
        margin-bottom: 50px;
    }

    /* 關鍵變更：首頁內容段落改為 Lora 字體 */
    .intro-content p {
        font-family: 'Lora', 'Noto Sans TC', serif;
        font-size: 1.4rem; 
        line-height: 2.2;  /* Lora 字體視覺上較寬，稍微調降行距讓排版緊湊些 */
        margin-bottom: 2.2rem;
        letter-spacing: 0.5px; /* Lora 本身間距剛好，稍微減少額外的字距 */
    }

    .intro-content strong {
        color: #8d6e63;
        font-weight: 700;
    }

    @media (max-width: 768px) {
        .home-main {
            padding-top: 100px;
        }
        .intro-content p {
            font-size: 1.25rem;
        }
    }
</style>
