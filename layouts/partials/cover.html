<div class="slideshow-container">
    <div class="slide fade" style="background-image: url('/images/cover1.jpg');"></div>
    <div class="slide fade" style="background-image: url('/images/cover2.jpg');"></div>
    <div class="slide fade" style="background-image: url('/images/cover3.jpg');"></div>
</div>

<style>
.slideshow-container {
    position: relative;
    width: 100%;
    height: 550px;
    background: #f8f9fa;
    overflow: hidden;
    margin-bottom: 2rem;
}
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: fadeAnimation 15s infinite;
}
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }

@keyframes fadeAnimation {
    0% { opacity: 0; }
    5% { opacity: 1; }
    33% { opacity: 1; }
    38% { opacity: 0; }
    100% { opacity: 0; }
}
</style>
