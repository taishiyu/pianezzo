<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<header class="custom-site-header {{ if .IsHome }}is-home{{ else }}is-page{{ end }}">
    {{ if .IsHome }}
        <div class="slideshow-container">
            <div class="slide" style="background-image: url('{{ "images/cover1.jpg" | absURL }}');"></div>
            <div class="slide" style="background-image: url('{{ "images/cover2.jpg" | absURL }}');"></div>
            <div class="slide" style="background-image: url('{{ "images/cover3.jpg" | absURL }}');"></div>
            <div class="overlay"></div>
        </div>
    {{ else }}
        <div class="static-banner" style="background-image: url('{{ if .Params.featured_image }}{{ .Params.featured_image | absURL }}{{ else }}{{ "images/cover1.jpg" | absURL }}{{ end }}');">
            <div class="overlay"></div>
        </div>
    {{ end }}

    <!-- 絕對鎖定區：直接指定座標，不受主題 HTML 影響 -->
    <div class="absolute-center-box">
        <h1 class="site-title-custom"><a href="{{ .Site.BaseURL }}">Il Giardino Nascosto</a></h1>
        <nav class="site-nav-custom">
            {{ range .Site.Menus.main }}
            <a class="nav-link-custom" href="{{ .URL | absURL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </div>
</header>

<style>
/* 1. 基礎強制重置 */
body { margin: 0; padding: 0; font-family: 'Lora', 'Noto Sans TC', serif; background-color: #f4f1ea; }

.custom-site-header { 
    position: relative !important; 
    width: 100% !important; 
    overflow: hidden !important; 
    display: block !important;
}

@media (min-width: 769px) { 
    .custom-site-header.is-home { height: 600px !important; }
    .custom-site-header.is-page { height: 500px !important; } 
}

.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.35); z-index: 5; }
.static-banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; }

/* 2. 絕對座標法：釘死在 50% 的位置 */
.absolute-center-box {
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: 100% !important;
    z-index: 10 !important;
    text-align: center !important;
    margin: 0 !important;
    padding: 0 !important;
}

/* 3. 標題與選單：移除所有可能被主題繼承的 Margin */
.site-title-custom { margin: 0 !important; padding: 0 !important; line-height: 1 !important; }
.site-title-custom a { 
    font-family: 'Tangerine', cursive !important; 
    font-size: 7.5rem !important; 
    color: #f4f1ea !important; 
    text-decoration: none !important; 
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5) !important;
}

.site-nav-custom { 
    margin-top: 55px !important; /* 精確鎖定間距 */
    padding: 0 !important;
    display: flex !important;
    justify-content: center !important;
    gap: 60px !important; /* 使用橫向間距 */
}

.nav-link-custom { 
    font-family: 'Tangerine', cursive !important; 
    font-size: 3.5rem !important; 
    color: #f4f1ea !important; 
    text-decoration: none !important; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5) !important;
}

@media (max-width: 768px) { 
    .custom-site-header.is-home { height: 100vh !important; }
    .custom-site-header.is-page { height: 70vh !important; }
    .site-title-custom a { font-size: 4.5rem !important; }
    .site-nav-custom { flex-direction: column !important; gap: 15px !important; margin-top: 30px !important; }
    .nav-link-custom { font-size: 3.2rem !important; }
}

/* 輪播動畫 */
.slideshow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; animation: safariFade 15s infinite; }
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }
@keyframes safariFade { 0% { opacity: 0; } 5% { opacity: 1; } 33% { opacity: 1; } 38% { opacity: 0; } 100% { opacity: 0; } }
</style>
