<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Noto+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<header class="site-header">
    <div class="slideshow-container">
        <div class="slide" style="background-image: url('{{ "images/cover1.jpg" | absURL }}');"></div>
        <div class="slide" style="background-image: url('{{ "images/cover2.jpg" | absURL }}');"></div>
        <div class="slide" style="background-image: url('{{ "images/cover3.jpg" | absURL }}');"></div>
        <div class="overlay"></div>
    </div>
    <div class="header-content">
        <h1 class="site-title"><a href="{{ "/" | absURL }}">Il Giardino Nascosto</a></h1>
        <nav class="site-nav">
            {{ range .Site.Menus.main }}
            <a class="nav-link" href="{{ .URL | absURL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </div>
</header>

<style>
body { margin: 0; padding: 0; font-family: 'Noto Sans', 'Noto Sans TC', sans-serif; line-height: 1.8; color: #333; }

.site-header { position: relative; width: 100%; color: #fff; text-align: center; overflow: hidden; }
.slideshow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #111; }
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.35); }

/* 電腦版樣式 */
.header-content { padding: 100px 20px; }
.site-title a { 
    font-family: 'Tangerine', cursive; 
    font-size: 7.5rem; 
    font-weight: 700; 
    color: #f4f1ea; 
    text-decoration: none; 
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5); 
}

.site-nav { margin-top: 20px; display: flex; justify-content: center; flex-wrap: wrap; }
.nav-link { 
    font-family: 'Tangerine', cursive; 
    font-size: 3.2rem; 
    font-weight: 700; 
    color: #f4f1ea; 
    margin: 0 25px; 
    text-decoration: none; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    transition: 0.3s; 
}

/* 手機版優化：核心變更 */
@media (max-width: 768px) { 
    .site-header { height: auto; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .header-content { padding: 40px 10px; width: 100%; }
    .site-title a { font-size: 5rem; line-height: 1.2; }
    
    .site-nav { 
        flex-direction: column; /* 垂直排列 */
        align-items: center;
        margin-top: 30px;
    }
    
    .nav-link { 
        font-size: 3.5rem; /* 字體加大，方便點擊 */
        margin: 15px 0;    /* 增加垂直間距，避免誤觸 */
        display: block;
        width: 100%;
    }
}

@media (min-width: 769px) { .site-header { height: 750px; } }

.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; animation: safariFade 15s infinite; }
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }
@keyframes safariFade { 0% { opacity: 0; } 5% { opacity: 1; } 33% { opacity: 1; } 38% { opacity: 0; } 100% { opacity: 0; } }
</style>
