<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<header class="site-header {{ if .IsHome }}is-home{{ else }}is-page{{ end }}">
    {{ if .IsHome }}
        <div class="slideshow-container">
            <div class="slide" style="background-image: url('{{ "images/cover1.jpg" | absURL }}');"></div>
            <div class="slide" style="background-image: url('{{ "images/cover2.jpg" | absURL }}');"></div>
            <div class="slide" style="background-image: url('{{ "images/cover3.jpg" | absURL }}');"></div>
            <div class="overlay"></div>
        </div>
    {{ else }}
        <div class="static-banner" style="background-image: url('{{ if .Params.featured_image }}{{ .Params.featured_image | absURL }}{{ else }}{{ "images/cover1.jpg" | absURL }}{{ end }}');">
            <div class="overlay"></div>
        </div>
    {{ end }}

    <div class="header-anchor">
        <div class="header-content">
            <h1 class="site-title"><a href="{{ .Site.BaseURL }}">Il Giardino Nascosto</a></h1>
            <nav class="site-nav">
                {{ range .Site.Menus.main }}
                <a class="nav-link" href="{{ .URL | absURL }}">{{ .Name }}</a>
                {{ end }}
            </nav>
        </div>
    </div>
</header>

<style>
/* 1. 全域樣式鎖定 */
body { margin: 0; padding: 0; font-family: 'Lora', 'Noto Sans TC', serif; background-color: #f4f1ea; }

.site-header { position: relative; width: 100%; overflow: hidden; background-color: #111; }

/* 🔴 強制鎖定：無論是 Single 還是 List，只要不是 Home，高度通通 500px */
@media (min-width: 769px) { 
    .site-header.is-home { height: 600px !important; }
    .site-header:not(.is-home) { height: 500px !important; } 
}

.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.35); z-index: 1; }
.static-banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; }

/* 🔴 座標釘死法：強制無視任何父層 Padding */
.header-anchor {
    position: absolute;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: 100%;
    z-index: 10;
    text-align: center;
}

.header-content { 
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    gap: 60px !important; /* 強制標題與目錄間距為 60px */
    padding: 0 !important;
    margin: 0 !important;
}

.site-title { margin: 0 !important; padding: 0 !important; line-height: 1 !important; }
.site-title a { 
    font-family: 'Tangerine', cursive; 
    font-size: 7.5rem !important; 
    font-weight: 700; color: #f4f1ea; text-decoration: none; 
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5); display: inline-block;
    transition: 0.4s;
}

.site-nav { 
    margin: 0 !important; padding: 0 !important; 
    display: flex !important; justify-content: center !important; flex-wrap: wrap !important;
    line-height: 1 !important;
}

.nav-link { 
    font-family: 'Tangerine', cursive; 
    font-size: 3.5rem !important; 
    font-weight: 700; color: #f4f1ea; 
    margin: 0 30px !important; 
    text-decoration: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    display: inline-block; transition: 0.4s;
}

.site-title a:hover, .nav-link:hover { color: #ffffff; transform: translateY(-5px); }

@media (max-width: 768px) { 
    .site-header.is-home { height: 100vh !important; }
    .site-header:not(.is-home) { height: 70vh !important; }
    .header-content { gap: 30px !important; }
    .site-title a { font-size: 4.5rem !important; }
    .nav-link { font-size: 3.2rem !important; margin: 10px 0 !important; }
}

/* 輪播動畫 (維持原樣) */
.slideshow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; animation: safariFade 15s infinite; }
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }
@keyframes safariFade { 0% { opacity: 0; } 5% { opacity: 1; } 33% { opacity: 1; } 38% { opacity: 0; } 100% { opacity: 0; } }
</style>
